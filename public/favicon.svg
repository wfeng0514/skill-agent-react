<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#5a4bd1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b894"/>
      <stop offset="100%" stop-color="#00a381"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6c5ce7" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- 装饰性电路/节点 -->
  <circle cx="128" cy="128" r="12" fill="url(#accent)" opacity="0.6"/>
  <circle cx="384" cy="128" r="8" fill="#00b894" opacity="0.4"/>
  <circle cx="384" cy="384" r="12" fill="url(#accent)" opacity="0.6"/>
  <circle cx="128" cy="384" r="8" fill="#00b894" opacity="0.4"/>
  <circle cx="256" cy="80" r="6" fill="#fff" opacity="0.3"/>
  <circle cx="432" cy="256" r="6" fill="#fff" opacity="0.3"/>

  <!-- 连接线 -->
  <line x1="128" y1="140" x2="180" y2="200" stroke="#00b894" stroke-width="2.5" opacity="0.3"/>
  <line x1="372" y1="128" x2="330" y2="180" stroke="#00b894" stroke-width="2.5" opacity="0.3"/>
  <line x1="372" y1="372" x2="330" y2="330" stroke="#00b894" stroke-width="2.5" opacity="0.3"/>
  <line x1="136" y1="372" x2="180" y2="320" stroke="#00b894" stroke-width="2.5" opacity="0.3"/>

  <!-- 字母 S -->
  <text
    x="256" y="295"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'SF Pro Display', -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="260"
    font-weight="800"
    fill="#fff"
    filter="url(#shadow)"
    letter-spacing="-8"
  >S</text>

  <!-- S 上的渐变高光覆盖 -->
  <text
    x="256" y="295"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'SF Pro Display', -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="260"
    font-weight="800"
    fill="url(#accent)"
    opacity="0.15"
    letter-spacing="-8"
  >S</text>

  <!-- 右上角小 "A" 代表 Agent -->
  <text
    x="375" y="175"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
    font-size="72"
    font-weight="700"
    fill="#00b894"
    filter="url(#glow)"
    opacity="0.9"
  >A</text>
</svg>
